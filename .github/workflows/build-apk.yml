name: Build APK

on:
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/build-apk.yml'
      - 'app-source/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Cordova
      run: npm install -g cordova@12

    - name: Create Cordova project
      run: |
        cordova create cordova-app com.download.app "Rapp downloader"

    - name: Add Android platform
      working-directory: cordova-app
      run: cordova platform add android@12

    - name: Write config.xml
      working-directory: cordova-app
      run: |
        cat > config.xml << 'XMLEOF'
        <?xml version='1.0' encoding='utf-8'?>
        <widget id="com.download.app" version="1.0.0"
          xmlns="http://www.w3.org/ns/widgets"
          xmlns:cdv="http://cordova.apache.org/ns/1.0">
          <name>Rapp downloader</name>
          <description>Built with APK Builder Pro</description>
          <author>APK Builder Pro</author>
          <content src="index.html" />
          <plugin name="cordova-plugin-whitelist" spec="^1" />
          <access origin="*" />
          <allow-navigation href="*" />
          <allow-intent href="http://*/*" />
          <allow-intent href="https://*/*" />
          <preference name="android-targetSdkVersion" value="34" />
          <preference name="android-minSdkVersion" value="22" />
          <preference name="Fullscreen" value="false" />
        </widget>
        XMLEOF

    - name: Write app HTML
      working-directory: cordova-app/www
      run: |
        rm -f index.html css/index.css js/index.js img/logo.png
        cat > index.html << 'HTMLEOF'
        <!DOCTYPE html>
        <html>
        <head>
          <meta charset="utf-8"/>
          <meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
          <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval' data: blob:"/>
          <title>Rapp downloader</title>
          <style>
            * { margin:0; padding:0; box-sizing:border-box }
            html,body,iframe { width:100%; height:100%; border:none; overflow:hidden }
          </style>
        </head>
        <body>
          <iframe src="https://rapzz-audio-downloader.replit.app/" allowfullscreen></iframe>
        </body>
        </html>
        HTMLEOF

    - name: Build release APK
      working-directory: cordova-app
      run: cordova build android --release -- --packageType=apk

    - name: Find APK
      id: find_apk
      run: |
        APK=$(find cordova-app/platforms/android -name "*.apk" | head -1)
        echo "path=$APK" >> $GITHUB_OUTPUT
        echo "Found APK: $APK"

    - name: Rename APK
      run: |
        cp "${{ steps.find_apk.outputs.path }}" "Rapp-downloader-release.apk"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Rapp-downloader-apk
        path: Rapp-downloader-release.apk
        retention-days: 30
