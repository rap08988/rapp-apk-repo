name: Build APK

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Node.js 18
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Cordova
      run: npm install -g cordova@12

    - name: Create Cordova project
      run: cordova create cordova-app com.building.app "Rapzz building apk"

    - name: Add Android platform
      working-directory: cordova-app
      run: cordova platform add android

    - name: Remove default Cordova splash screen plugin
      working-directory: cordova-app
      run: cordova plugin remove cordova-plugin-splashscreen --nosave 2>/dev/null || true

    - name: Write config.xml
      working-directory: cordova-app
      run: echo "" | base64 -d > config.xml

    - name: Generate Android launcher icons from custom icon
      run: |
        mkdir -p cordova-app/resources
        cp res/icon/icon.png cordova-app/resources/icon.png
        mkdir -p cordova-app/res/icon
        cp res/icon/icon.png cordova-app/res/icon/icon.png
        cd cordova-app
        npx --yes cordova-res android --skip-config --copy 2>/dev/null || true

    - name: Write index.html
      working-directory: cordova-app/www
      run: |
        rm -rf *
        echo "" | base64 -d > index.html

    - name: Build debug APK
      working-directory: cordova-app
      run: cordova build android --debug

    - name: Find and upload APK
      run: |
        APK=$(find cordova-app/platforms/android -name "*.apk" | head -1)
        echo "APK found: $APK"
        cp "$APK" "Rapzz-building-apk-debug.apk"

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: Rapzz-building-apk-apk
        path: Rapzz-building-apk-debug.apk
        retention-days: 30
